<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurnal Si Kelinci</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8F0;
    --paper:#FFFDF9;
    --pink:#FFD9E8;
    --pink-deep:#FF7FA3;
    --peach:#FFCBA4;
    --mint:#BFF0D6;
    --mint-deep:#4FBE8B;
    --lav:#DAD0FB;
    --lav-deep:#9D8AE8;
    --plum:#5B4B57;
    --plum-soft:#8C7B88;
    --line:#F0DFE6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Quicksand',sans-serif;
    background:var(--cream);
    color:var(--plum);
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }
  .page{
    width:100%;
    max-width:560px;
  }
  h1,h2,.display{
    font-family:'Fredoka',sans-serif;
  }
  .header{
    text-align:center;
    margin-bottom:8px;
  }
  .header h1{
    font-size:28px;
    font-weight:600;
    margin:8px 0 2px;
    color:var(--pink-deep);
  }
  .header p{
    margin:0;
    font-size:14px;
    color:var(--plum-soft);
  }
  .mascot-wrap{
    display:flex;
    justify-content:center;
    margin:8px 0 4px;
  }
  .card{
    background:var(--paper);
    border-radius:24px;
    padding:20px 22px;
    margin-top:18px;
    box-shadow:0 4px 0 var(--line);
    border:2px solid var(--line);
    position:relative;
  }
  .tape{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%) rotate(-2deg);
    width:70px;
    height:22px;
    background:var(--lav);
    opacity:0.85;
    border-radius:3px;
  }
  .card h2{
    font-size:17px;
    font-weight:600;
    margin:2px 0 14px;
    color:var(--plum);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .date-pill{
    display:inline-block;
    background:var(--pink);
    color:#93395B;
    font-size:13px;
    font-weight:600;
    padding:4px 14px;
    border-radius:20px;
    margin:0 auto 4px;
  }
  .center{text-align:center;}
  .task{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 4px;
    border-bottom:1.5px dashed var(--line);
  }
  .task:last-child{border-bottom:none;}
  .task label{
    flex:1;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
  }
  .task.done label{
    text-decoration:line-through;
    color:var(--plum-soft);
  }
  .checkbox{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2.5px solid var(--pink-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    background:var(--paper);
    transition:background 0.15s, transform 0.1s;
    font-size:14px;
    user-select:none;
  }
  .checkbox.checked{
    background:var(--pink-deep);
    color:white;
    transform:scale(1.05);
  }
  .add-row{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .add-row input{
    flex:1;
    border:2px solid var(--line);
    border-radius:14px;
    padding:8px 12px;
    font-family:'Quicksand',sans-serif;
    font-size:14px;
    background:var(--cream);
    outline:none;
  }
  .add-row input:focus{border-color:var(--pink-deep);}
  .btn{
    border:none;
    border-radius:14px;
    padding:8px 16px;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    background:var(--lav);
    color:#4A3B87;
  }
  .btn:active{transform:scale(0.97);}
  .mood-row{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin-top:4px;
  }
  .mood-btn{
    flex:1;
    background:var(--cream);
    border:2px solid var(--line);
    border-radius:16px;
    padding:10px 4px;
    font-size:22px;
    cursor:pointer;
    text-align:center;
  }
  .mood-btn.selected{
    border-color:var(--peach);
    background:#FFF0E2;
    transform:scale(1.05);
  }
  textarea{
    width:100%;
    min-height:90px;
    border:2px solid var(--line);
    border-radius:16px;
    padding:12px;
    font-family:'Quicksand',sans-serif;
    font-size:14px;
    resize:vertical;
    background:var(--cream);
    outline:none;
    color:var(--plum);
  }
  textarea:focus{border-color:var(--pink-deep);}
  .save-btn{
    width:100%;
    margin-top:16px;
    background:var(--pink-deep);
    color:white;
    border:none;
    border-radius:18px;
    padding:14px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
  }
  .save-btn:active{transform:scale(0.98);}
  .stats-row{
    display:flex;
    gap:12px;
    margin-top:18px;
  }
  .stat{
    flex:1;
    background:var(--mint);
    border-radius:18px;
    padding:14px;
    text-align:center;
  }
  .stat.lav{background:var(--lav);}
  .stat .num{
    font-family:'Fredoka',sans-serif;
    font-size:24px;
    font-weight:600;
    color:var(--plum);
  }
  .stat .lbl{
    font-size:12px;
    color:var(--plum-soft);
    font-weight:600;
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--plum);
    color:white;
    padding:10px 22px;
    border-radius:20px;
    font-size:14px;
    font-weight:600;
    opacity:0;
    transition:opacity 0.25s, transform 0.25s;
    pointer-events:none;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .loading{
    text-align:center;
    padding:40px;
    color:var(--plum-soft);
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="mascot-wrap" id="mascotWrap"></div>
    <h1>Jurnal Si Kelinci</h1>
    <p>Rutinitas kecil, langkah kecil, tetap semangat ya~</p>
  </div>

  <div id="app" class="loading">memuat jurnal...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_PREFIX = 'entry-';
const moods = [
  {v:1, e:'😢', label:'sedih'},
  {v:2, e:'😐', label:'biasa'},
  {v:3, e:'🙂', label:'oke'},
  {v:4, e:'😊', label:'senang'},
  {v:5, e:'🥰', label:'bahagia'}
];
const defaultTasks = [
  'Peregangan / napas tenang pagi',
  'Apply lamaran siang',
  'Me-time santai',
  'Jalan kaki / gerak badan ringan',
  'Journaling malam',
  'Apply lamaran malam'
];

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function prettyDate(){
  const d = new Date();
  return d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
}

function bunnySVG(mood){
  const faces = {
    0: {mouth:'M 40 58 Q 50 52 60 58', eye:'closed'},
    1: {mouth:'M 40 58 Q 50 65 60 58', eye:'open'},
    2: {mouth:'M 42 58 L 58 58', eye:'open'},
    3: {mouth:'M 40 56 Q 50 66 60 56', eye:'open'},
    4: {mouth:'M 38 55 Q 50 70 62 55', eye:'happy'},
    5: {mouth:'M 38 54 Q 50 72 62 54', eye:'happy'}
  };
  const f = faces[mood] ?? faces[2];
  let eyes;
  if(f.eye==='closed'){
    eyes = '<path d="M 32 44 Q 36 40 40 44" stroke="#5B4B57" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 60 44 Q 64 40 68 44" stroke="#5B4B57" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
  } else if(f.eye==='happy'){
    eyes = '<path d="M 32 46 Q 36 40 40 46" stroke="#5B4B57" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 60 46 Q 64 40 68 46" stroke="#5B4B57" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
  } else {
    eyes = '<circle cx="36" cy="44" r="3.2" fill="#5B4B57"/><circle cx="64" cy="44" r="3.2" fill="#5B4B57"/>';
  }
  return `
  <svg width="140" height="150" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="34" cy="20" rx="8" ry="20" fill="#FFE3EC" stroke="#5B4B57" stroke-width="2"/>
    <ellipse cx="66" cy="20" rx="8" ry="20" fill="#FFE3EC" stroke="#5B4B57" stroke-width="2"/>
    <ellipse cx="34" cy="22" rx="4" ry="13" fill="#FF9EBB"/>
    <ellipse cx="66" cy="22" rx="4" ry="13" fill="#FF9EBB"/>
    <ellipse cx="50" cy="60" rx="36" ry="32" fill="#FFF6EC" stroke="#5B4B57" stroke-width="2.5"/>
    ${eyes}
    <ellipse cx="50" cy="52" rx="4" ry="3" fill="#FFC7A6"/>
    <path d="${f.mouth}" stroke="#5B4B57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="25" cy="60" rx="6" ry="4" fill="#FFD9E8" opacity="0.8"/>
    <ellipse cx="75" cy="60" rx="6" ry="4" fill="#FFD9E8" opacity="0.8"/>
  </svg>`;
}

let state = {
  tasks: defaultTasks.map((t,i)=>({id:'t'+i, text:t, done:false})),
  mood: null,
  notes: '',
  nextId: defaultTasks.length
};

function completionRatio(){
  if(state.tasks.length===0) return 0;
  return state.tasks.filter(t=>t.done).length / state.tasks.length;
}

function moodScoreForMascot(){
  const ratio = completionRatio();
  if(state.mood) return state.mood;
  return Math.round(ratio*5);
}

function renderMascot(){
  document.getElementById('mascotWrap').innerHTML = bunnySVG(moodScoreForMascot());
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function render(){
  const app = document.getElementById('app');
  const ratio = completionRatio();
  const pct = Math.round(ratio*100);

  app.innerHTML = `
    <div class="card">
      <div class="tape"></div>
      <div class="center"><span class="date-pill">${prettyDate()}</span></div>
      <h2>🌸 Rutinitas hari ini (${pct}%)</h2>
      <div id="taskList"></div>
      <div class="add-row">
        <input id="newTaskInput" placeholder="tambah kegiatan kecil lain..." />
        <button class="btn" id="addTaskBtn">tambah</button>
      </div>
    </div>

    <div class="card">
      <h2>💭 Perasaan hari ini</h2>
      <div class="mood-row" id="moodRow"></div>
    </div>

    <div class="card">
      <h2>📝 Catatan kecil</h2>
      <textarea id="notesArea" placeholder="tulis apa aja yang kamu rasain hari ini, sekecil apapun...">${state.notes}</textarea>
      <button class="save-btn" id="saveBtn">simpan hari ini 🐇💕</button>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="num" id="streakNum">-</div>
        <div class="lbl">hari beruntun</div>
      </div>
      <div class="stat lav">
        <div class="num" id="totalNum">-</div>
        <div class="lbl">total jurnal</div>
      </div>
    </div>
  `;

  const taskList = document.getElementById('taskList');
  state.tasks.forEach(t=>{
    const row = document.createElement('div');
    row.className = 'task' + (t.done ? ' done' : '');
    row.innerHTML = `
      <div class="checkbox ${t.done?'checked':''}" data-id="${t.id}">${t.done?'✓':''}</div>
      <label data-id="${t.id}">${t.text}</label>
    `;
    taskList.appendChild(row);
  });

  const moodRow = document.getElementById('moodRow');
  moods.forEach(m=>{
    const b = document.createElement('div');
    b.className = 'mood-btn' + (state.mood===m.v ? ' selected' : '');
    b.textContent = m.e;
    b.dataset.v = m.v;
    moodRow.appendChild(b);
  });

  document.querySelectorAll('.checkbox').forEach(cb=>{
    cb.addEventListener('click', ()=>{
      const id = cb.dataset.id;
      const task = state.tasks.find(x=>x.id===id);
      task.done = !task.done;
      render();
      renderMascot();
    });
  });
  document.querySelectorAll('.task label').forEach(lb=>{
    lb.addEventListener('click', ()=>{
      const id = lb.dataset.id;
      const task = state.tasks.find(x=>x.id===id);
      task.done = !task.done;
      render();
      renderMascot();
    });
  });
  document.querySelectorAll('.mood-btn').forEach(mb=>{
    mb.addEventListener('click', ()=>{
      state.mood = Number(mb.dataset.v);
      render();
      renderMascot();
    });
  });
  document.getElementById('addTaskBtn').addEventListener('click', addTask);
  document.getElementById('newTaskInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') addTask();
  });
  document.getElementById('notesArea').addEventListener('input', e=>{
    state.notes = e.target.value;
  });
  document.getElementById('saveBtn').addEventListener('click', saveToday);

  loadStats();
  renderMascot();
}

function addTask(){
  const input = document.getElementById('newTaskInput');
  const val = input.value.trim();
  if(!val) return;
  state.tasks.push({id:'t'+(state.nextId++), text:val, done:false});
  input.value='';
  render();
}

async function saveToday(){
  const key = STORAGE_PREFIX + todayKey();
  try{
    await window.storage.set(key, JSON.stringify({
      tasks: state.tasks,
      mood: state.mood,
      notes: state.notes,
      savedAt: new Date().toISOString()
    }), false);
    showToast('tersimpan! semangat terus ya 🐰🌷');
    loadStats();
  }catch(err){
    showToast('gagal menyimpan, coba lagi ya');
    console.error(err);
  }
}

async function loadToday(){
  const key = STORAGE_PREFIX + todayKey();
  try{
    const res = await window.storage.get(key, false);
    if(res && res.value){
      const data = JSON.parse(res.value);
      if(data.tasks && data.tasks.length) state.tasks = data.tasks;
      state.mood = data.mood ?? null;
      state.notes = data.notes ?? '';
      state.nextId = state.tasks.length;
    }
  }catch(e){
    /* belum ada entri hari ini, tidak apa-apa */
  }
}

async function loadStats(){
  try{
    const listRes = await window.storage.list(STORAGE_PREFIX, false);
    const keys = (listRes && listRes.keys) ? listRes.keys : [];
    const dates = keys.map(k=>k.replace(STORAGE_PREFIX,'')).sort();
    document.getElementById('totalNum').textContent = dates.length;

    let streak = 0;
    let cursor = new Date();
    for(let i=0;i<400;i++){
      const dStr = cursor.getFullYear()+'-'+String(cursor.getMonth()+1).padStart(2,'0')+'-'+String(cursor.getDate()).padStart(2,'0');
      if(dates.includes(dStr)){
        streak++;
        cursor.setDate(cursor.getDate()-1);
      } else {
        if(dStr === todayKey()){
          cursor.setDate(cursor.getDate()-1);
          continue;
        }
        break;
      }
    }
    document.getElementById('streakNum').textContent = streak;
  }catch(e){
    document.getElementById('totalNum').textContent = '0';
    document.getElementById('streakNum').textContent = '0';
  }
}

(async function init(){
  await loadToday();
  render();
})();
</script>
</body>
</html>
